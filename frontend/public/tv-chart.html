<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; background: #0f172a; }
    #tv-container { height: 100%; width: 100%; }
    .tradingview-widget-container { height: 100%; width: 100%; }
    .tradingview-widget-container__widget { height: 100%; width: 100%; }
  </style>
</head>
<body>
  <div class="tradingview-widget-container" id="tv-container">
    <div class="tradingview-widget-container__widget"></div>
  </div>
  <script>
    var p = new URLSearchParams(window.location.search);
    var symbol   = p.get('symbol')   || 'FX:EURUSD';
    var interval = p.get('interval') || '60';

    var config = {
      autosize: true,
      symbol: symbol,
      interval: interval,
      timezone: 'Asia/Jakarta',
      theme: 'dark',
      style: '1',
      locale: 'en',
      backgroundColor: 'rgba(15, 23, 42, 1)',
      gridColor: 'rgba(30, 41, 59, 0.5)',
      hide_top_toolbar: false,
      hide_side_toolbar: false,
      allow_symbol_change: false,
      save_image: false,
      calendar: false,
      withdateranges: true,
      hide_volume: false
    };

    var s = document.createElement('script');
    s.type = 'text/javascript';
    s.async = true;
    s.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
    s.text = JSON.stringify(config);
    document.getElementById('tv-container').appendChild(s);
  </script>
</body>
</html>
