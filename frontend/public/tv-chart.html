<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; background: #0f172a; }
    .tradingview-widget-container { height: 100%; width: 100%; }
    .tradingview-widget-container__widget { height: calc(100% - 32px); width: 100%; }
    .tradingview-widget-copyright { line-height: 32px; text-align: center; }
    .tradingview-widget-copyright a { color: #9db2bd; }
  </style>
</head>
<body>
<script>
  // Read symbol + interval from URL params, then document.write the complete
  // widget HTML so the <script> tag is *parser-inserted* (not dynamically
  // appended). Only parser-inserted scripts have document.currentScript set
  // when TradingView's embed code reads its JSON config.
  var p = new URLSearchParams(window.location.search);
  var symbol   = p.get('symbol')   || 'FX:EURUSD';
  var interval = p.get('interval') || '60';

  var cfg = JSON.stringify({
    autosize: true,
    symbol: symbol,
    interval: interval,
    timezone: 'Asia/Jakarta',
    theme: 'dark',
    style: '1',
    locale: 'en',
    backgroundColor: 'rgba(15, 23, 42, 1)',
    hide_top_toolbar: false,
    hide_side_toolbar: false,
    allow_symbol_change: false,
    save_image: false,
    calendar: false,
    withdateranges: true
  });

  // Split the closing tag to avoid the HTML parser ending this script block early
  var ST = '<' + 'script';
  var EN = '</' + 'script>';

  document.write(
    '<div class="tradingview-widget-container">' +
    '<div class="tradingview-widget-container__widget"></div>' +
    ST + ' type="text/javascript"' +
        ' src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js"' +
        ' async="">' +
    cfg +
    EN + '>' +
    '</div>'
  );
</script>
</body>
</html>
